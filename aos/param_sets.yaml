# Parameter sets for AOS FAM wavefront analysis
#
# Each entry defines a dataset processed by Bryce Kalmbach's Butler pipelines.
# Referenced by name in runs.yaml and by --param-set in run_mktable.py.
#
# Fields:
#   butler_repo:      Butler repository path
#   fam_collections:  Butler collection name(s)
#   fam_programs:     Science program names (test blocks)
#   day_obs_min/max:  Date range covered by the collection (optional)

fam_danish_v15_aug_oct:
  description: "Aug-Oct 2025, wep v15.0.2, dviz v2.5.0"
  butler_repo: /repo/main
  fam_programs: [T278, T381, T492, T539, T614]
  fam_collections:
    - u/brycek/aos_fam_danish/wep_v15_0_2/donut_viz_v2_5_0/20250801_20250831
    - u/brycek/aos_fam_danish/wep_v15_0_2/donut_viz_v2_5_0/20250901_20251028
  day_obs_min: 20250801
  day_obs_max: 20251028

