fam_danish_1_0_wep17_3_0_bin2x:
  description: "Mar-May 2026, /repo/main, Danish 1.0 wep 17.3.0 dv 4.2.0 bin x2 paired"
  butler_repo: /repo/main
  fam_programs: [T278, T381, T492, T539, T614, T710, T717, T720, T724]
  fam_collections:
    - LSSTCam/runs/aos/fam/danish_1_0/wep_17_3_0/dv_4_2_0/bin_x2/paired
  # In-focus corner-WFS (cwfs) collections paired with this FAM run; the in-focus
  # exposure is FAM_seq+1 (triplet order intra, extra, in-focus; FAM key = extra).
  # Map of descriptive-name -> Butler collection.  The name is filename-safe and
  # becomes the output subdir  output/<ps>/wfs/<name>/ .  Add further CWFS
  # variants as extra keys to repeat the WFS analysis side by side.
  wfs_collections:
    wep17_3_0: LSSTCam/runs/aos/cwfs/danish_1_0/wep_17_3_0/dv_4_2_0/bin_x2
  # Collection name has slashes — set an explicit filename-safe phrase
  collection_phrase: aos_fam_danish_1_0_wep17_3_0_bin2x
  day_obs_min: 20260315
  day_obs_max: 20260531

fam_danish_1_1_1_wep17_3_0_bin2x:
  description: "Mar-May 2026, /repo/main, Danish 1.1.1 wep 17.3.0 dv 4.2.0 bin x2 paired; reuse RSO-582 donut stamps"
  butler_repo: /repo/main
