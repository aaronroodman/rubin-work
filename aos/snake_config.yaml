# ----------------------------------------------------------------------
# Snakemake pipeline config.
# Each param_set lists the date chunks to process: mktable + fit run per
# chunk, then `combine` concatenates the chunks into one param_set-level
# table (output/<param_set>/{donuts,fits,visits}.parquet) that all
# downstream steps use.  Butler/collection definitions live in
# param_sets.yaml (referenced by name).
#
# Add data -> add/edit a chunk -> Snakemake re-runs combine + downstream.
# (Chunks derived from the old runs.yaml.)
# ----------------------------------------------------------------------
